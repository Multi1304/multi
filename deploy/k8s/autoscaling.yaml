apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: camel-worker-hpa
  namespace: camel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: camel-worker
  minReplicas: 6
  maxReplicas: 24
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
