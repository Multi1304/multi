apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-api
  namespace: camel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: camel-api
  template:
    metadata:
      labels:
        app: camel-api
    spec:
      containers:
        - name: api
          image: camel/api:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: camel-api
  namespace: camel
spec:
  selector:
    app: camel-api
  ports:
    - port: 80
      targetPort: 4000
