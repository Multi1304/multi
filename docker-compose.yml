
services:
  # Edge Automation Nodes (Cluster Mode with low RAM footprint)
  edge-workers:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      replicas: 5 # Can scale up to 10
      resources:
        limits:
          cpus: '0.8'
          memory: 1G # Strict limit to fit in 16GB RAM laptop alongside Ollama
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis-cache:6379
      - DATABASE_URL=postgresql://user:pass@db:5432/multilogin
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/sync:/app/sync # Mount for potential S3/Firebase sync scripts
    depends_on:
      - redis-cache
      - db

  # Local DB
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multilogin
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      
  # High-speed Cache (V3 10k+ profile scalability)
  redis-cache:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis7-data:/data

volumes:
  db-data:
  redis-data:
  redis7-data:
